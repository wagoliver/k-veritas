services:
  postgres:
    image: postgres:16-alpine
    container_name: kveritas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: kveritas
      POSTGRES_PASSWORD: kveritas
      POSTGRES_DB: kveritas
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - kv-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kveritas -d kveritas"]
      interval: 5s
      timeout: 5s
      retries: 10

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: kveritas-clickhouse
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: kveritas
      CLICKHOUSE_USER: kveritas
      CLICKHOUSE_PASSWORD: kveritas
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse-server
    networks:
      - kv-net
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --user kveritas --password kveritas --query 'SELECT 1' >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 60s

  migrate:
    build:
      context: ./app
      dockerfile: Dockerfile
      target: source
    container_name: kveritas-migrate
    env_file:
      - ./app/.env.local
    environment:
      DATABASE_URL: postgres://kveritas:kveritas@postgres:5432/kveritas
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_DB: kveritas
      CLICKHOUSE_USER: kveritas
      CLICKHOUSE_PASSWORD: kveritas
      NODE_ENV: production
    command: sh -c "pnpm pg:migrate && pnpm ch:migrate"
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    networks:
      - kv-net
    restart: "no"

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
      target: runtime
    container_name: kveritas-app
    restart: unless-stopped
    env_file:
      - ./app/.env.local
    environment:
      DATABASE_URL: postgres://kveritas:kveritas@postgres:5432/kveritas
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_DB: kveritas
      CLICKHOUSE_USER: kveritas
      CLICKHOUSE_PASSWORD: kveritas
      APP_URL: http://localhost:3000
      OLLAMA_URL: http://ollama:11434
      NODE_ENV: production
    ports:
      - "3000:3000"
    volumes:
      - artifacts:/data
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      - kv-net

  crawler:
    build:
      context: ./crawler
      dockerfile: Dockerfile
    container_name: kveritas-crawler
    restart: unless-stopped
    env_file:
      - ./app/.env.local
    environment:
      DATABASE_URL: postgres://kveritas:kveritas@postgres:5432/kveritas
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_DB: kveritas
      CLICKHOUSE_USER: kveritas
      CLICKHOUSE_PASSWORD: kveritas
      DATA_DIR: /data
      NODE_ENV: production
    volumes:
      - artifacts:/data
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      - kv-net

  runner:
    build:
      context: ./runner
      dockerfile: Dockerfile
    container_name: kveritas-runner
    restart: unless-stopped
    env_file:
      - ./app/.env.local
    environment:
      DATABASE_URL: postgres://kveritas:kveritas@postgres:5432/kveritas
      DATA_DIR: /data
      WORK_DIR: /work
      NODE_ENV: production
    volumes:
      - artifacts:/data
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      - kv-net

  codex:
    build:
      context: ./codex
      dockerfile: Dockerfile
    container_name: kveritas-codex
    restart: unless-stopped
    env_file:
      - ./app/.env.local
    environment:
      DATABASE_URL: postgres://kveritas:kveritas@postgres:5432/kveritas
      DATA_DIR: /data
      WORK_DIR: /work
      # Modelo default quando a org_ai_config.model não aponta um
      # valor. BYOK: a ANTHROPIC_API_KEY vem criptografada do Postgres
      # por org — nunca do env do container.
      CODEX_MODEL: claude-sonnet-4-5-20250929
      CODEX_MAX_BUDGET_USD: "5"
      CODEX_POLL_MS: "2000"
      CODEX_STALE_SECONDS: "900"
      NODE_ENV: production
    volumes:
      - artifacts:/data
      - codex_work:/work
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      - kv-net

  ollama:
    image: ollama/ollama:latest
    container_name: kveritas-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    networks:
      - kv-net
    environment:
      OLLAMA_KEEP_ALIVE: "1h"
      OLLAMA_HOST: "0.0.0.0"
    # Descomentar o bloco abaixo para habilitar GPU NVIDIA
    # (exige nvidia-container-toolkit instalado no host)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

networks:
  kv-net:
    driver: bridge

volumes:
  postgres_data:
  clickhouse_data:
  clickhouse_logs:
  artifacts:
  codex_work:
  ollama_models:
